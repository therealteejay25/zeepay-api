version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: zeepay-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: zeepay-es
    volumes:
      - mongo-data:/data/db
    command: mongod --replSet rs0

  mongo-init:
    image: mongo:7
    depends_on:
      - mongodb
    restart: "no"
    entrypoint: >
      bash -c "
        sleep 5 &&
        mongosh --host mongodb:27017 --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongodb:27017\"}]})'
      "

volumes:
  mongo-data:
